services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_WS_URL: ${VITE_WS_URL:-}
    container_name: imonitor-staging-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8098}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - imonitor-staging-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: imonitor-staging-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3098}:3000"
    environment:
      NODE_ENV: staging
      PORT: ${PORT:-3000}
      API_PREFIX: ${API_PREFIX:-/api/v1}
      DATABASE_URL: ${DATABASE_URL:-postgresql://imonitor_staging:imonitor_staging_Zk8xQ7wP@postgres:5432/imonitor_staging_db?schema=public}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_staging_Vm4nR9tL_2026}
      REDIS_DB: ${REDIS_DB:-0}
      JWT_SECRET: ${JWT_SECRET:-iMonitorServer-staging-jwt-Hy7kL3mW9pQ2xR5vN8bJ-2026}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION:-15m}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8098}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-200}
      AGENT_HEARTBEAT_TIMEOUT_SECONDS: ${AGENT_HEARTBEAT_TIMEOUT_SECONDS:-60}
      AGENT_HEARTBEAT_INTERVAL_SECONDS: ${AGENT_HEARTBEAT_INTERVAL_SECONDS:-15}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - imonitor-staging-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  postgres:
    image: postgres:16-alpine
    container_name: imonitor-staging-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-imonitor_staging_db}
      POSTGRES_USER: ${POSTGRES_USER:-imonitor_staging}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-imonitor_staging_Zk8xQ7wP}
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5498}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-imonitor_staging} -d ${POSTGRES_DB:-imonitor_staging_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - imonitor-staging-network

  redis:
    image: redis:7-alpine
    container_name: imonitor-staging-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_staging_Vm4nR9tL_2026}
    volumes:
      - redis_staging_data:/data
    ports:
      - "${REDIS_EXPOSED_PORT:-6498}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_staging_Vm4nR9tL_2026}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - imonitor-staging-network

volumes:
  postgres_staging_data:
    driver: local
    name: imonitor-staging-postgres-data
  redis_staging_data:
    driver: local
    name: imonitor-staging-redis-data

networks:
  imonitor-staging-network:
    driver: bridge
    name: imonitor-staging-network
