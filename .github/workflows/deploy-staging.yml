name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: imonitor_ci_db
          POSTGRES_USER: imonitor_ci
          POSTGRES_PASSWORD: ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U imonitor_ci -d imonitor_ci_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Push schema to test DB
        run: npx prisma db push --skip-generate
        env:
          DATABASE_URL: postgresql://imonitor_ci:ci_password@localhost:5432/imonitor_ci_db?schema=public

      - name: TypeScript check
        run: npx tsc --noEmit --project tsconfig.json

      - name: Run tests
        run: npx vitest run --reporter=verbose
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://imonitor_ci:ci_password@localhost:5432/imonitor_ci_db?schema=public
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: ci-test-jwt-secret

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest run --reporter=verbose

  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t imonitor-backend:${{ github.sha }} ./backend

      - name: Build frontend image
        run: docker build -t imonitor-frontend:${{ github.sha }} ./frontend

      - name: Verify images
        run: |
          docker images | grep imonitor
          echo "Images built successfully for commit ${{ github.sha }}"

      - name: Docker Compose validation
        run: docker compose -f docker-compose.yml config --quiet

  deploy-staging:
    name: Deploy to Staging
    runs-on: self-hosted
    needs: [build-images]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Deploy with Docker Compose
        run: |
          docker compose -f docker-compose.staging.yml --env-file .env.staging -p imonitor-staging up -d --build

      - name: Wait for health checks
        run: |
          echo "Waiting for services..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3098/api/v1/health > /dev/null 2>&1; then
              echo "Backend healthy after ${i}s"
              break
            fi
            sleep 2
          done
          curl -f http://localhost:3098/api/v1/health || exit 1
          curl -f http://localhost:8098/ || exit 1
          echo "All staging services healthy!"

      - name: Show status
        if: always()
        run: docker compose -f docker-compose.staging.yml -p imonitor-staging ps -a

      - name: Collect logs on failure
        if: failure()
        run: docker compose -f docker-compose.staging.yml -p imonitor-staging logs --tail=200
