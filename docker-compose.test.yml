services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_WS_URL: ${VITE_WS_URL:-}
    container_name: imonitor-test-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8099}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - imonitor-test-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: imonitor-test-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3099}:3000"
    environment:
      NODE_ENV: test
      PORT: ${PORT:-3000}
      API_PREFIX: ${API_PREFIX:-/api/v1}
      DATABASE_URL: ${DATABASE_URL:-postgresql://imonitor_test:imonitor_test_password_2026@postgres:5432/imonitor_test_db?schema=public}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_test_secret_2026}
      REDIS_DB: ${REDIS_DB:-1}
      JWT_SECRET: ${JWT_SECRET:-iMonitorServer-test-jwt-secret-key-2026-xK9mP2}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION:-30m}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-1d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8099}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-500}
      AGENT_HEARTBEAT_TIMEOUT_SECONDS: ${AGENT_HEARTBEAT_TIMEOUT_SECONDS:-90}
      AGENT_HEARTBEAT_INTERVAL_SECONDS: ${AGENT_HEARTBEAT_INTERVAL_SECONDS:-30}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - imonitor-test-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  postgres:
    image: postgres:16-alpine
    container_name: imonitor-test-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-imonitor_test_db}
      POSTGRES_USER: ${POSTGRES_USER:-imonitor_test}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-imonitor_test_password_2026}
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5440}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-imonitor_test} -d ${POSTGRES_DB:-imonitor_test_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - imonitor-test-network

  redis:
    image: redis:7-alpine
    container_name: imonitor-test-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_test_secret_2026}
    volumes:
      - redis_test_data:/data
    ports:
      - "${REDIS_EXPOSED_PORT:-6390}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_test_secret_2026}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - imonitor-test-network

volumes:
  postgres_test_data:
    driver: local
    name: imonitor-test-postgres-data
  redis_test_data:
    driver: local
    name: imonitor-test-redis-data

networks:
  imonitor-test-network:
    driver: bridge
    name: imonitor-test-network
