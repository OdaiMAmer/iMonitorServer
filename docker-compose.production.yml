services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: imonitor-prod-frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-443}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - imonitor-prod
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: imonitor-prod-backend
    restart: always
    ports:
      - "${PORT:-3100}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public&connection_limit=20
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRATION: 15m
      JWT_REFRESH_EXPIRATION: 7d
      CORS_ORIGIN: ${CORS_ORIGIN:-https://monitor.yourdomain.com}
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX_REQUESTS: 100
      HEARTBEAT_TIMEOUT_SEC: 60
      LOG_LEVEL: warn
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - imonitor-prod
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"

  postgres:
    image: postgres:16-alpine
    container_name: imonitor-prod-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - prod_postgres_data:/var/lib/postgresql/data
      - prod_postgres_backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - imonitor-prod
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  redis:
    image: redis:7-alpine
    container_name: imonitor-prod-redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - prod_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - imonitor-prod
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # Automated daily database backups
  db-backup:
    image: postgres:16-alpine
    container_name: imonitor-prod-backup
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
    volumes:
      - prod_postgres_backups:/backups
    entrypoint: >
      sh -c "pg_dump -Fc > /backups/backup_$$(date +%Y%m%d_%H%M%S).dump &&
             find /backups -name '*.dump' -mtime +7 -delete &&
             echo 'Backup complete, old backups cleaned'"
    networks:
      - imonitor-prod
    profiles:
      - backup

volumes:
  prod_postgres_data:
    driver: local
  prod_postgres_backups:
    driver: local
  prod_redis_data:
    driver: local

networks:
  imonitor-prod:
    driver: bridge
