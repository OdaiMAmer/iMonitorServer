<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <script id="imonitor-preview-auth">
      // Preview mode: bypass authentication
      if (window.location.pathname === '/login') {
        localStorage.removeItem('imonitor-auth');
      } else if (!localStorage.getItem('imonitor-auth')) {
        localStorage.setItem('imonitor-auth', JSON.stringify({
          state: {
            user: { id: 'preview-user', name: 'Preview User', email: 'preview@imonitor.local', role: 'admin', createdAt: new Date().toISOString(), isActive: true },
            accessToken: 'preview-token',
            isAuthenticated: true
          },
          version: 0
        }));
      }
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <title>iMonitorServer</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
